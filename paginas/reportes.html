<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>

        Reportes | StudentBudget

    </title>

    <link
        rel="stylesheet"
        href="../css/reportes.css">

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <div class="contenedor">


        <!-- NAV -->

        <nav>

            <div class="logo">

                <i class="fa-solid fa-wallet"></i>

                <h2>

                    StudentBudget

                </h2>

            </div>


            <div class="menu">

                <a href="../index.html">

                    <i class="fa-solid fa-house"></i>

                    Inicio

                </a>


                <a class="activo">

                    <i class="fa-solid fa-chart-column"></i>

                    Reportes

                </a>

            </div>

        </nav>


        <!-- MAIN -->

        <main>


            <!-- HEADER -->

            <header>

                <div>

                    <h1>

                        Reportes Financieros

                    </h1>

                    <p>

                        Visualiza el comportamiento
                        de tus finanzas

                    </p>

                </div>


                <div class="usuario">

                    <i class="fa-solid fa-user"></i>

                    Estudiante

                </div>

            </header>



            <!-- CONTENIDO -->

            <section class="contenido">


                <!-- RESUMEN -->

                <section class="resumen">

                    <article class="card-resumen">

                        <h3>

                            Total Ingresos

                        </h3>

                        <h2 id="reporteIngresos">

                            $0.00

                        </h2>

                    </article>


                    <article class="card-resumen">

                        <h3>

                            Total Gastos

                        </h3>

                        <h2 id="reporteGastos">

                            $0.00

                        </h2>

                    </article>


                    <article class="card-resumen">

                        <h3>

                            Ahorro Generado

                        </h3>

                        <h2 id="reporteAhorro">

                            $0.00

                        </h2>

                    </article>

                </section>



                <!-- GRAFICA BARRAS -->

                <section class="grafica">

                    <div class="card grande">

                        <h3>

                            Gastos por Categoría

                        </h3>


                        <div class="grafica-barras">


                            <div class="fila">

                                <span>

                                    Comida

                                </span>

                                <div class="barra">

                                    <div
                                        id="barraComida"
                                        class="valor comida">

                                    </div>

                                </div>

                                <span id="textoComida">

                                    $0

                                </span>

                            </div>



                            <div class="fila">

                                <span>

                                    Transporte

                                </span>

                                <div class="barra">

                                    <div
                                        id="barraTransporte"
                                        class="valor transporte">

                                    </div>

                                </div>

                                <span id="textoTransporte">

                                    $0

                                </span>

                            </div>



                            <div class="fila">

                                <span>

                                    Educación

                                </span>

                                <div class="barra">

                                    <div
                                        id="barraEducacion"
                                        class="valor educacion">

                                    </div>

                                </div>

                                <span id="textoEducacion">

                                    $0

                                </span>

                            </div>



                            <div class="fila">

                                <span>

                                    Ocio

                                </span>

                                <div class="barra">

                                    <div
                                        id="barraOcio"
                                        class="valor ocio">

                                    </div>

                                </div>

                                <span id="textoOcio">

                                    $0

                                </span>

                            </div>


                        </div>

                    </div>

                </section>

            </section>



            <!-- FOOTER -->

            <footer>

                © 2026 StudentBudget |
                Proyecto Académico

            </footer>

        </main>

    </div>


    <script src="../js/script.js"></script>

</body>

</html>
